<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=390, initial-scale=1, shrink-to-fit=no" />
    <title>Instagram</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background-color: #1a1a1a;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }
      body { overflow: hidden; }
      #root {
        width: 390px;
        height: 100vh;
        max-height: 844px;
        overflow: hidden;
        display: flex;
        flex: 1;
        position: relative;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
      }
      @media (min-height: 900px) {
        body { align-items: center; }
        #root { border-radius: 44px; height: 844px; }
      }
    </style>
  </head>
  <body>
    <noscript>Necesitás JavaScript para correr esta app.</noscript>
    <div id="root"></div>
  </body>
</html>
